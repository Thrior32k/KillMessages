prefix: "&#EE3333&lKM&r &7» "
reload: "&#33FF33Successfully reloaded the plugin!"
usage: "&fUsage: &7/killmessages <reload|toggle>"

toggle:
  enabled: "&#33FF33Kill messages are now &aenabled&f!"
  disabled: "&#33FF33Kill messages are now &cdisabled&f!"

per-world-killmessages: false

item-format: "%item%"
empty-hand-text: "air"

errors:
  no-permission: "&#FF3333You don't have a permission to use this!"

# do not change this
version: 5