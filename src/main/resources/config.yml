# Builtin placeholders:
#  %victim%
#
# These only work in the KILLED message:
#  %attacker%
#  %item%
#
# Also in the KILLED message you can parse placeholders as the killer like this:
# normal: %statistic_player_kills%
# parsed as attacker: %[ATTACKER]statistic_player_kills%
#
# To remove a death message set the text to an empty string: ""

# list of all the valid death causes: https://hub.spigotmc.org/javadocs/spigot/org/bukkit/event/entity/EntityDamageEvent.DamageCause.html
# note: the plugin already auto generates them when the server starts
death-messages:
  KILLED: '&#FF3333☠ %victim% &7was killed by &#33ff33🗡 %[ATTACKER]player_displayname% &7[&#FF0078%[ATTACKER]player_health_rounded%❤&7]'
  FALL: '&#FF3333☠ %victim% &7fell down from a high place!'
  VOID: '&#FF3333☠ %victim% &7fell in the void!'
  LAVA: '&#FF3333☠ %victim% &7got burnt by lava'
  DROWNING: '&#FF3333☠ %victim% &7drowned'
  FREEZE: '&#FF3333☠ %victim% &7died!'
  CONTACT: '&#33ff33%victim% &fdied!'
  CRAMMING: '&#33ff33%victim% &fdied!'
  ENTITY_SWEEP_ATTACK: '&#33ff33%victim% &fdied!'
  FIRE_TICK: '&#FF3333☠ %victim% &7died!'
  ENTITY_EXPLOSION: '&#33ff33%victim% &fdied!'
  WITHER: '&#33ff33%victim% &fdied!'
  FIRE: '&#FF3333☠ %victim% &7burned to death'
  MAGIC: '&#FF3333☠ %victim% &7died!'
  PROJECTILE: '&#FF3333☠ %victim% &7was shot'
  CUSTOM: '&#FF3333☠ %victim% &7died!'
  SUICIDE: '&#33ff33%victim% &fdied!'
  DRAGON_BREATH: '&#33ff33%victim% &fdied!'
  SONIC_BOOM: '&#FF3333☠ %victim% &7died!'
  CAMPFIRE: '&#FF3333☠ %victim% &7died!'
  LIGHTNING: '&#33ff33%victim% &fdied!'
  FALLING_BLOCK: '&#FF3333☠ %victim% &7died!'
  FLY_INTO_WALL: '&#FF3333☠ %victim% &7crashed into the Twin Tower'
  THORNS: '&#33ff33%victim% &fdied!'
  ENTITY_ATTACK: '&#33ff33%victim% &fdied!'
  WORLD_BORDER: '&#33ff33%victim% &fdied!'
  SUFFOCATION: '&#FF3333☠ %victim% &7died!'
  DRYOUT: '&#33ff33%victim% &fdied!'
  MELTING: '&#33ff33%victim% &fdied!'
